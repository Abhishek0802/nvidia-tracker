version: "3.9"

networks:
  # Join Daytona's network so the orchestrator can reach sandbox containers
  daytona-net:
    external: true
    name: daytona_daytona-network

services:

  # Orchestrator runs as a container.
  # Scraper and Writer agents run as on-demand Daytona sandboxes — no containers here.
  orchestrator:
    build:
      context: .                        # root so we can COPY scraper/ and writer/
      dockerfile: orchestrator/Dockerfile
    networks:
      - daytona-net                     # same network as Daytona sandboxes
    volumes:
      - ./output:/app/output            # reports land here
      - ./logs:/logs                    # orchestrator logs
    env_file: .env
    environment:
      - DAYTONA_API_URL=http://api:3000/api   # api = Daytona API container hostname
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"
